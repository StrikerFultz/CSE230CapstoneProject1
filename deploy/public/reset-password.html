<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIPS Emulator · Set New Password</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container { max-width: 400px; margin: 60px auto; padding: 0 20px; }
    .auth-card { background: #e0e0e0; border: 1px solid #000; padding: 24px; }
    .auth-card h2 { font-size: 18px; text-align: center; margin: 0 0 8px; }
    .auth-card p { font-size: 13px; color: #555; text-align: center; margin: 0 0 20px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .field input { width: 100%; padding: 6px 8px; font-size: 13px; border: 1px solid #999; border-radius: 2px; box-sizing: border-box; }
    .auth-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 600; border: 1px solid #000; border-radius: 2px; cursor: pointer; margin-top: 8px; background: #4caf50; color: #fff; }
    .auth-btn:hover { opacity: 0.9; }
    .auth-error { color: #e74c3c; font-size: 13px; text-align: center; min-height: 1.4em; margin-top: 8px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">MIPS Emulator</div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Set New Password</h2>
      <p>You must set a new password before continuing.</p>

      <div class="field">
        <label for="reset-current">Current Password</label>
        <input id="reset-current" type="password" autocomplete="current-password" />
      </div>
      <div class="field">
        <label for="reset-new">New Password</label>
        <input id="reset-new" type="password" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="reset-confirm">Confirm New Password</label>
        <input id="reset-confirm" type="password" autocomplete="new-password" />
      </div>

      <button id="reset-btn" class="auth-btn">Set New Password</button>
      <p id="reset-error" class="auth-error"></p>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    document.getElementById('reset-btn').addEventListener('click', async () => {
      const current = document.getElementById('reset-current').value;
      const newPass = document.getElementById('reset-new').value;
      const confirm = document.getElementById('reset-confirm').value;
      const errorEl = document.getElementById('reset-error');
      errorEl.textContent = '';

      if (!current || !newPass || !confirm) {
        errorEl.textContent = 'Please fill in all fields.';
        return;
      }
      if (newPass !== confirm) {
        errorEl.textContent = 'New passwords do not match.';
        return;
      }
      if (newPass.length < 4) {
        errorEl.textContent = 'Password must be at least 4 characters.';
        return;
      }

      try {
        const res  = await fetch(`${API_BASE}/auth/change-password`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: current, new_password: newPass })
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Failed to update password.';
          return;
        }

        localStorage.setItem('professorAuthed', 'true');
        window.location.href = 'teacher.html';
      } catch (err) {
        errorEl.textContent = 'Network error. Is the server running?';
      }
    });

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('reset-btn').click();
      });
    });
  </script>
</body>
</html>
